<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Match3 Lite</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Match3 Lite</h1>

    <section id="startScreen" class="start-screen">
      <h2>Start Game</h2>
      <label>Player name
        <input id="playerName" maxlength="20" placeholder="Enter name" />
      </label>
      <button id="startBtn">Start</button>
    </section>

    <section id="gameScreen" class="hidden">
      <section class="panel">
        <div class="stats">
          <div>Player: <strong id="playerLabel">—</strong></div>
          <div>Score: <strong id="score">0</strong></div>
          <div>Moves: <strong id="moves">30</strong></div>
          <div id="bestComboBox" class="best-combo">Best Combo: <strong id="bestComboValue">0</strong> <span id="bestComboLabel">—</span></div>
          <div class="hints-counter">Hints: <strong id="hintsLeft">3/3</strong></div>
        </div>
        <div class="actions">
          <button id="shuffleBtn">Shuffle</button>
          <button id="newGameBtn">New Game</button>
        </div>
      </section>

      <div class="game-row">
        <section id="board" class="board" aria-label="Match 3 board">
          <button id="hintBtn" class="hint-btn hidden" data-tooltip="Получить подсказку" aria-label="Get hint">?</button>
          <div id="comboOverlay" class="combo-overlay hidden">
            <div id="comboPopup" class="combo-popup">100</div>
            <div id="comboLabel" class="combo-label">Great!</div>
          </div>
        </section>
      </div>

      <section class="leaderboard">
        <h2>Leaderboard</h2>
        <ol id="leaderboardList"></ol>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
