<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match3 Lite</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Match3 Lite</h1>

    <section id="startScreen" class="start-screen">
      <h2>Start Game</h2>
      <label>Player name
        <input id="playerName" maxlength="20" placeholder="Enter name" />
      </label>
      <button id="startBtn">Start</button>
    </section>

    <section id="gameScreen" class="hidden">
      <section class="panel">
        <div class="stats">
          <div>Player: <strong id="playerLabel">—</strong></div>
          <div>Score: <strong id="score">0</strong></div>
          <div>Moves: <strong id="moves">30</strong></div>
        </div>
        <button id="newGameBtn">New Game</button>
      </section>

      <div class="game-row">
        <section id="board" class="board" aria-label="Match 3 board"></section>
        <aside class="combo-side">
          <div id="comboPopup" class="combo-popup hidden">100</div>
          <div id="comboLabel" class="combo-label hidden">Great!</div>
        </aside>
      </div>

      <section class="leaderboard">
        <h2>Leaderboard</h2>
        <ol id="leaderboardList"></ol>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
